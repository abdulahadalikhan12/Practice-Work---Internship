# nginx config for the Notes Service (Windows).
# ONE public entry point (port 80) serving the built React app,
# and forwarding API calls to FastAPI/uvicorn on port 8000.

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        server_name localhost;

        # ---- Frontend: serve the React build output ----
        # IMPORTANT: change this path to your actual project location.
        # Use forward slashes even on Windows -- nginx expects them.
        # This must point at frontend/dist, NOT frontend/src.
        root   "D:/extra project/adept-tech internship/Day 3/notes_service/frontend/dist";
        index  index.html;

        location / {
            try_files $uri /index.html;
        }

        # ---- API: reverse proxy to FastAPI ----
        location /notes/ {
            proxy_pass http://127.0.0.1:8000/notes/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
